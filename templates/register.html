<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Skill Swap Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --theme-color: #06b6d4;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(6, 182, 212, 0.3);
            color: white;
        }
        .glass-input:focus {
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.15);
        }
        .gradient-button {
            background: linear-gradient(135deg, var(--theme-color) 0%, #0891b2 100%);
            transition: all 0.3s ease;
        }
        .gradient-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .animated-bg {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="relative overflow-hidden">
    <!-- Animated Background Elements -->
    <div class="animated-bg top-20 -left-20 w-96 h-96 bg-cyan-400"></div>
    <div class="animated-bg bottom-20 -right-20 w-96 h-96 bg-blue-400" style="animation-delay: 2s;"></div>
    
    <!-- Main Content -->
    <div class="relative z-10 min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full glass-morphism mb-4">
                    <i class="fas fa-user-plus text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Join Skill Swap Hub</h1>
                <p class="text-gray-200">Create your account and start sharing knowledge!</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-6 space-y-2">
                        {% for category, message in messages %}
                            <div class="glass-morphism p-4 rounded-2xl text-white {% if category == 'error' %}bg-red-500/20{% elif category == 'success' %}bg-green-500/20{% else %}bg-blue-500/20{% endif %}">
                                <span class="block">{{ message }}</span>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Registration Form -->
            <div class="glass-morphism rounded-2xl p-8 shadow-2xl">
                <form method="POST" action="{{ url_for('register') }}" class="space-y-6" enctype="multipart/form-data">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-200 mb-2">
                            Username <span class="text-red-400">*</span>
                        </label>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               required
                               class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all"
                               placeholder="Choose a unique username">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-200 mb-2">
                            Email <span class="text-red-400">*</span>
                        </label>
                        <input type="email" 
                               id="email" 
                               name="email" 
                               required
                               class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all"
                               placeholder="your@email.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-200 mb-2">
                            Password <span class="text-red-400">*</span>
                        </label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               required
                               class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all"
                               placeholder="Create a strong password">
                    </div>

                    <div>
                        <label for="bio" class="block text-sm font-medium text-gray-200 mb-2">
                            Bio
                        </label>
                        <textarea id="bio" 
                                  name="bio" 
                                  rows="3"
                                  class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all resize-none"
                                  placeholder="Tell us about yourself and your interests..."></textarea>
                    </div>

                    <div>
                        <label for="hobbies" class="block text-sm font-medium text-gray-200 mb-2">
                            Hobbies & Skills
                        </label>
                        <input type="text" 
                               id="hobbies" 
                               name="hobbies" 
                               class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all"
                               placeholder="e.g., Python, Design, Photography, Cooking">
                    </div>

                    <div>
                        <label for="profile_photo" class="block text-sm font-medium text-gray-200 mb-2">
                            Profile Photo
                        </label>
                        <div class="flex items-center space-x-4">
                            <input type="file" 
                                   id="profile_photo" 
                                   name="profile_photo" 
                                   accept="image/png,image/jpeg,image/jpg,image/gif"
                                   class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none transition-all file:mr-4 file:py-2">
                            <div id="photo-preview" class="w-16 h-16 rounded-full glass-morphism flex items-center justify-center">
                                <i class="fas fa-camera text-gray-300"></i>
                            </div>
                        </div>
                    </div>

                    <button type="submit" 
                            class="gradient-button w-full py-3 px-4 rounded-xl text-white font-semibold shadow-lg">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <div class="mt-6 text-center">
                    <p class="text-gray-200">
                        Already have an account? 
                        <a href="{{ url_for('login') }}" 
                           class="text-cyan-300 hover:text-cyan-200 font-semibold transition-colors">
                            Login here
                        </a>
                    </p>
                </div>
            </div>

            <!-- Back to Home -->
            <div class="mt-8 text-center">
                <a href="{{ url_for('home') }}" 
                   class="text-gray-300 hover:text-white transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Photo preview functionality
        document.getElementById('profile_photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('photo-preview');
            
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Add interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
