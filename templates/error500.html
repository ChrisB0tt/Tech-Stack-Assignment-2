<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Skill Swap Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto p-6">
        <div class="text-center">
            <div class="mb-8">
                <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                <h1 class="text-6xl font-bold text-gray-800 mb-2">500</h1>
                <h2 class="text-2xl font-semibold text-gray-700 mb-4">Server Error</h2>
            </div>
            
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <p class="text-gray-600 mb-6">
                    Something went wrong on our end! Our technical team has been notified 
                    and is working to fix this issue. Please try again in a few moments.
                </p>
                
                <div class="space-y-3">
                    <button onclick="history.back()" class="block w-full bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Go Back
                    </button>
                    
                    <a href="{{ url_for('home') }}" class="block w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                        <i class="fas fa-home mr-2"></i>
                        Back to Home
                    </a>
                </div>
            </div>
            
            <div class="text-sm text-gray-500">
                <p>If this problem persists, please contact our support team.</p>
            </div>
        </div>
    </div>
</body>
</html>
